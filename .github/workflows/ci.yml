name: MeshIdentity CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check with black
        run: |
          pip install black
          black --check --diff .

      - name: Run tests
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: |
          twine check dist/*

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate README
        run: |
          pip install readme-md-generator || true
          # Just check that README exists and is valid markdown
          python -c "import sys; f=open('README.md','r'); print('README OK, length:', len(f.read())); f.close()"

      - name: Check docs structure
        run: |
          python -c "
import os
docs = ['docs/architecture.md', 'README.md', 'CHANGELOG.md']
for d in docs:
    if os.path.exists(d):
        print(f'✅ {d}')
    else:
        print(f'⚠️  {d} not found')
        sys.exit(1)
"
